    <script>
        // Load navbar from external file
        fetch('navbar.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navbar-container').innerHTML = data;
                document.getElementById('link-what-the-officer-said').classList.add('active');
            });

        // Load bio and social section from external file
        fetch('bio-social.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('bio-social-container').innerHTML = data;
            });

        // Function to detect Safari browser
        function isSafari() {
            return /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
        }

        document.addEventListener("DOMContentLoaded", function() {
            var audioSource = document.getElementById("audioSource");
            if (isSafari()) {
                audioSource.src = "static/ohyeah.wav";
                audioSource.type = "audio/wav";
                var audioPlayer = document.getElementById("audioPlayer");
                audioPlayer.load(); // Needed to load the new source
            }
        });
    </script>
